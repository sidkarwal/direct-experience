name: Daily Discovery

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC every day
  workflow_dispatch:        # run manually anytime

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run discovery
        run: node scripts/discover.js

      - name: Commit pending posts
        run: |
          git config user.name "direct-experience-bot"
          git config user.email "bot@directexperience.now"
          git add data/pending.json
          git diff --cached --quiet || git commit -m "discovery: add candidates $(date +%Y-%m-%d)"
          git push
